name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate YAML
        run: npx tsx scripts/validate-yaml.ts

      - name: Build
        run: pnpm exec astro build --base /
        env:
          ASTRO_TELEMETRY_DISABLED: '1'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-preview
          path: ./dist
          retention-days: 14

  comment:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview instructions on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactName = `pr-${prNumber}-preview`;
            const artifactUrl = `${runUrl}#artifacts`;
            const marker = '<!-- pr-preview -->';
            const body = `## 🔨 Static build ready for review

            This PR's static site has been built. To preview:

            1. Download the \`${artifactName}\` artifact from the [workflow run](${artifactUrl})
            2. Unzip it and serve locally:

               \`\`\`bash
               npx serve .
               \`\`\`

            3. Open the printed URL in your browser

            Or inspect the build output directly in [the workflow run](${runUrl}).

            _The artifact is retained for 14 days._`;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body: `${marker}\n${body}`,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body: `${marker}\n${body}`,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Update PR comment on close
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- pr-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body: `${marker}\n## 🔨 Preview outdated\n\nThe PR was merged/closed. The build artifact will expire automatically (14-day retention).`,
              });
            }
