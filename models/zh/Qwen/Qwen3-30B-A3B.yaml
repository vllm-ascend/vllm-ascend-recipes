verification: |-
  服务启动后，可以通过发送 prompt 调用模型。

  **Chat Completions API：**

  ```shell
  curl http://localhost:8000/v1/chat/completions \
      -H "Content-Type: application/json" \
      -d '{
          "model": "qwen3",
          "messages": [
              {"role": "user", "content": "Give me a short introduction to large language models."}
          ],
          "temperature": 0.6,
          "top_p": 0.95,
          "top_k": 20,
          "max_completion_tokens": 4096
      }'
  ```

  > - **URL** (`http://localhost:8000`)：请将 `localhost` 和 `8000` 替换为您的服务器 IP 和 `vllm serve` 命令中的 `--port` 值。
  > - **`model`**：必须与 `vllm serve` 命令中的 `--served-model-name` 值匹配（例如 `qwen3`）。

  预期结果：HTTP 200，JSON 响应中包含 `choices` 字段及生成的文本。
evaluation:
  accuracy:
    content: |-
      ### 使用 AISBench

      关于环境配置的详细信息（包括安装、数据集下载和配置文件设置），请参考[使用 AISBench](https://docs.vllm.ai/projects/ascend/zh-cn/latest/developer_guide/evaluation/using_ais_bench.html)。

      以下是以 GSM8K 数据集为例的精度评估配置文件示例：

      ```python
      # Example configuration: benchmarks/ais_bench/benchmark/configs/models/vllm_api/vllm_api_general_chat.py
      from ais_bench.benchmark.models import VLLMCustomAPIChat

      models = [
          dict(
              attr="service",
              type=VLLMCustomAPIChat,
              abbr='vllm-api-general-chat',
              path="your_model_path",
              model="qwen3",
              request_rate=0,
              retry=2,
              host_ip="localhost",
              host_port=8000,
              max_out_len=32768,
              batch_size=32,
              trust_remote_code=True,
              generation_kwargs=dict(
                  temperature=0.6,
                  top_k=20,
                  top_p=0.95,
              ),
          )
      ]
      ```

      以 `gsm8k` 数据集为例，运行精度评估：

      ```shell
      ais_bench --models vllm_api_general_chat --datasets gsm8k_gen_4_shot_cot_str --mode all --dump-eval-details --debug
      ```

      以下表格列出了每个评估数据集的 `--datasets` 参数：

      | 数据集         | `--datasets` 参数                    |
      | ------------- | ------------------------------------ |
      | GSM8K         | `gsm8k_gen_4_shot_cot_str`           |
      | GPQA-Diamond  | `gpqa_gen_0_shot_cot_chat_prompt`    |
      | AIME 2024     | `aime2024_gen_0_shot_str`            |
      | LiveCodeBench | `livecodebench_0_shot_chat_v4_v5_v6` |

      > `--models` 参数值对应配置文件名（例如 `vllm_api_general_chat` 对应 `vllm_api_general_chat.py`）。请根据实际场景调整 `max_out_len`、`batch_size` 和数据集任务。

      关于数据集准备，请参考 [AISBench 数据集指南](https://github.com/AISBench/benchmark/blob/master/docs/source_zh_cn/get_started/datasets.md)。

      vLLM-Ascend 还支持以下评估工具：

      - [lm_eval](https://docs.vllm.ai/projects/ascend/zh-cn/latest/developer_guide/evaluation/using_lm_eval.html)
      - [OpenCompass](https://docs.vllm.ai/projects/ascend/zh-cn/latest/developer_guide/evaluation/using_opencompass.html)
      - [EvalScope](https://docs.vllm.ai/projects/ascend/zh-cn/latest/developer_guide/evaluation/using_evalscope.html)

      **精度结果（Atlas 800I A3，vLLM-Ascend v0.22.1rc，W8A8）：**

      | 数据集         | 指标                   | 分数    |
      | ------------- | --------------------- | ------ |
      | GSM8K         | accuracy (4-shot CoT) | 92.87% |
      | GPQA-Diamond  | accuracy (0-shot CoT) | 60.10% |
      | LiveCodeBench | pass@1 (0-shot)       | 60.05% |
      | AIME 2024     | accuracy (0-shot)     | 76.67% |
  performance:
    content: |-
      ### 使用 AISBench

      关于环境配置的详细信息，请参考[使用 AISBench 进行性能评估](https://docs.vllm.ai/projects/ascend/zh-cn/latest/developer_guide/evaluation/using_ais_bench.html#execute-performance-evaluation)。

      首先，配置流式性能测试的模型配置（`ais_bench/benchmark/configs/models/vllm_api/vllm_api_stream_chat.py`）：

      ```python
      from ais_bench.benchmark.models import VLLMCustomAPIChat
      from ais_bench.benchmark.utils.postprocess.model_postprocessors import extract_non_reasoning_content

      models = [
          dict(
              attr="service",
              type=VLLMCustomAPIChat,
              abbr='vllm-api-stream-chat',
              path="your_model_path",
              model="qwen3",
              stream=True,
              request_rate=0,
              retry=2,
              host_ip="localhost",
              host_port=8000,
              max_out_len=1500,
              batch_size=32,
              trust_remote_code=True,
              generation_kwargs=dict(
                  temperature=0.01,
                  ignore_eos=True,
              ),
              pred_postprocessor=dict(type=extract_non_reasoning_content),
          )
      ]
      ```

      > 与精度配置的主要区别：`stream=True`、`ignore_eos=True`（确保输出达到 `max_out_len` 以保证 TPOT 测量的一致性），以及 `batch_size` 控制并发度。

      然后，配置合成数据集分布（`ais_bench/datasets/synthetic/synthetic_config.py`）。请根据实际场景调整配置。注意，随机合成数据不适合启用前缀缓存的基准测试场景，因为随机输入会产生零缓存命中率。

      ```python
      synthetic_config = {
          "Type": "string",
          "RequestCount": 200,
          "StringConfig": {
              "Input": {
                  "Method": "uniform",
                  "Params": {"MinValue": 3500, "MaxValue": 3500}
              },
              "Output": {
                  "Method": "uniform",
                  "Params": {"MinValue": 1500, "MaxValue": 1500}
              }
          }
      }
      ```

      然后运行性能评估：

      ```shell
      ais_bench --models vllm_api_stream_chat --datasets synthetic_gen --mode perf --debug
      ```

      > `--models` 的值应与模型配置文件中的 `abbr` 匹配。使用 `--num-prompts` 限制测试请求数量。

      ### 使用 vLLM Benchmark

      更多详情请参考 [vLLM benchmark](https://docs.vllm.ai/en/latest/benchmarking/)。

      以 `serve` 子命令为例。`--random-output-len` 参数控制每个请求的输出 token 数量；请根据目标场景进行调整（例如，短输出为 2048，长输出为 32768）。

      ```shell
      vllm bench serve \
          --model your_model_path \
          --served-model-name qwen3 \
          --port 8000 \
          --dataset-name random \
          --random-input 200 \
          --random-output-len 2048 \
          --num-prompts 200 \
          --request-rate 1 \
          --save-result \
          --result-dir ./
      ```
performance:
  benchmark: |-
    ### 推荐配置

    > **注意**：以下配置在特定测试环境中验证，仅供参考。最优配置取决于最大输入/输出长度、前缀缓存命中率、精度要求以及部署机器配比等因素。建议参考第 9.2 节根据实际情况进行调优。

    #### 表 1：场景概览

    | 场景     | 部署模式          | *总 NPU 数        | 权重版本 | 关键考量                                         |
    | ------- | ---------------- | ---------------- | ------- | ------------------------------------------------ |
    | 高吞吐   | 单节点（TP1）      | 1 (A3)<br>2 (A2) | W8A8    | 单卡部署最大化并发请求处理                           |
    | 低延迟   | 单节点（TP4）      | 2 (A3)<br>4 (A2) | W8A8    | 多卡 TP 配合 Expert Parallelism 降低每 token 延迟  |
    | 长上下文  | 单节点（TP4）      | 2 (A3)<br>4 (A2) | W8A8    | 减少并发序列数以适应更长的 max-model-len              |

    > `*总 NPU 数` 表示所有节点使用的 NPU 总数。在 Atlas 800I A3 上，每个 NPU 包含两个 die（芯片），因此 TP4 需要 4 个芯片 = 2 个 NPU。

    #### 表 2：详细节点配置

    | 场景     | NPU    | TP  | max-model-len | max-num-seqs | FUSED_MC2 | EP  | hf-overrides |
    | ------- | ------ | --- | ------------- | ------------ | --------- | --- | ------------ |
    | 高吞吐   | 1 (A3) | 1   | 37364         | 100          | Off       | Off | -            |
    | 低延迟   | 2 (A3) | 4   | 37364         | 100          | Off       | On  | -            |
    | 长上下文  | 2 (A3) | 4   | 131072        | 14           | Off       | On  | YaRN         |

    > 详细参数说明请参考第 5 节的部署示例。

    **低延迟配置：**

    ```shell
    export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3
    export HCCL_OP_EXPANSION_MODE="AIV"
    export HCCL_BUFFSIZE=1024
    export OMP_PROC_BIND=false
    export OMP_NUM_THREADS=1
    export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

    vllm serve your_model_path \
        --served-model-name qwen3 \
        --trust-remote-code \
        --max-num-seqs 100 \
        --max-model-len 37364 \
        --max-num-batched-tokens 16384 \
        --tensor-parallel-size 4 \
        --enable-expert-parallel \
        --distributed_executor_backend "mp" \
        --no-enable-prefix-caching \
        --async-scheduling \
        --quantization ascend \
        --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
        --additional-config '{"enable_flashcomm1": true, "weight_nz_mode": 2}' \
        --gpu-memory-utilization 0.95 \
        --port 8000 \
        --speculative-config '{"method": "eagle3","model": "your_eagle3_model_path", "num_speculative_tokens": 3}'
    ```

    该配置的 AISBench 示例设置：

    - `request_rate`：0
    - `batch_size`：32
    - 输入/输出长度：2048/2048 或 3500/1500

    **高吞吐配置：**

    ```shell
    export ASCEND_RT_VISIBLE_DEVICES=0
    export HCCL_OP_EXPANSION_MODE="AIV"
    export HCCL_BUFFSIZE=1024
    export OMP_PROC_BIND=false
    export OMP_NUM_THREADS=1
    export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

    vllm serve your_model_path \
        --served-model-name qwen3 \
        --trust-remote-code \
        --max-num-seqs 100 \
        --max-model-len 37364 \
        --max-num-batched-tokens 16384 \
        --tensor-parallel-size 1 \
        --distributed_executor_backend "mp" \
        --no-enable-prefix-caching \
        --async-scheduling \
        --quantization ascend \
        --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
        --additional-config '{"weight_nz_mode": 2}' \
        --gpu-memory-utilization 0.95 \
        --port 8000 \
        --speculative-config '{"method": "eagle3","model": "your_eagle3_model_path", "num_speculative_tokens": 3}'
    ```

    该配置的 AISBench 示例设置：

    - `request_rate`：0
    - `batch_size`：32
    - 输入/输出长度：2048/2048 或 3500/1500

    **长上下文配置：**

    ```shell
    export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3
    export HCCL_OP_EXPANSION_MODE="AIV"
    export HCCL_BUFFSIZE=1024
    export OMP_PROC_BIND=false
    export OMP_NUM_THREADS=1
    export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

    vllm serve your_model_path \
        --served-model-name qwen3 \
        --trust-remote-code \
        --max-num-seqs 14 \
        --max-model-len 131072 \
        --max-num-batched-tokens 16384 \
        --tensor-parallel-size 4 \
        --enable-expert-parallel \
        --distributed_executor_backend "mp" \
        --no-enable-prefix-caching \
        --async-scheduling \
        --quantization ascend \
        --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
        --additional-config '{"enable_flashcomm1": true, "weight_nz_mode": 2}' \
        --gpu-memory-utilization 0.95 \
        --port 8000 \
        --speculative-config '{"method": "eagle3","model": "your_eagle3_model_path", "num_speculative_tokens": 3}' \
        --hf-overrides '{"rope_parameters": {"rope_type":"yarn","factor":4,"original_max_position_embeddings":32768}}'
    ```

    该配置的 AISBench 示例设置：

    - `request_rate`：0
    - `batch_size`：32
    - 输入/输出长度：65536/1024 或 131072/1024
