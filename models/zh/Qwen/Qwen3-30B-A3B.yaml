quantization:
  content: |-
    Qwen3-30B-A3B-W8A8 采用混合量化策略（按模型结构顺序排列）：

    - **Embedding 层**：BF16（不量化）
    - **Q/K 归一化** (q_norm, k_norm)：BF16
    - **Attention 投影** (q/k/v/o_proj)：静态 W8A8，使用预计算的 per-tensor scales
    - **MoE 路由门** (mlp.gate)：BF16
    - **MoE 专家投影** (gate/up/down_proj)：动态 W8A8，推理时实时计算输入 scales

    如果无法直接下载 W8A8 量化权重，您可以使用 **msmodelslim** 从 BF16 模型量化获取。详情请参考[量化指南](https://docs.vllm.ai/projects/ascend/zh-cn/latest/user_guide/feature_guide/quantization.html)。本文档中的所有模型路径应调整为您实际本地的路径。
