env_setup:
  container:
    A3:
      content: |-
        您可以使用官方的 Qwen3 MoE 模型一体化 Docker 镜像。

        **拉取 Docker 镜像：**

        ```bash
        docker pull quay.io/ascend/vllm-ascend:{{ vllm_ascend_version }}
        ```

        **启动 Docker 容器：**

        ```bash

        export IMAGE=quay.io/ascend/vllm-ascend:{{ vllm_ascend_version }}-a3

        docker run \
            --name vllm-ascend-env \
            --shm-size=128g \
            --net=host \
            --privileged=true \
            --device /dev/davinci0 \
            --device /dev/davinci1 \
            --device /dev/davinci2 \
            --device /dev/davinci3 \
            --device /dev/davinci4 \
            --device /dev/davinci5 \
            --device /dev/davinci6 \
            --device /dev/davinci7 \
            --device /dev/davinci8 \
            --device /dev/davinci9 \
            --device /dev/davinci10 \
            --device /dev/davinci11 \
            --device /dev/davinci12 \
            --device /dev/davinci13 \
            --device /dev/davinci14 \
            --device /dev/davinci15 \
            --device /dev/davinci_manager \
            --device /dev/devmm_svm \
            --device /dev/hisi_hdc \
            -v /usr/local/Ascend/driver:/usr/local/Ascend/driver \
            -v /usr/local/dcmi:/usr/local/dcmi \
            -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \
            -v /etc/ascend_install.info:/etc/ascend_install.info \
            -v /usr/local/sbin:/usr/local/sbin \
            -v /home:/home \
            -v /data:/data \
            -v /tmp:/tmp \
            -v /mnt:/mnt \
            -v /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime \
            -v /root:/host_root \
            -it -d $IMAGE bash
        ```

        > **说明**：A3 有 8 个 NPU，采用双 die 设计（共 16 芯片：`/dev/davinci[0-15]`）。如果您在共享机器上，仅映射所需的芯片（例如，NPU 0-3 使用 `/dev/davinci[0-7]`）。
    A2:
      content: |-
        您可以使用官方的 Qwen3 MoE 模型一体化 Docker 镜像。

        **拉取 Docker 镜像：**

        ```bash
        docker pull quay.io/ascend/vllm-ascend:{{ vllm_ascend_version }}
        ```

        **启动 Docker 容器：**

        ```bash

        export IMAGE=quay.io/ascend/vllm-ascend:{{ vllm_ascend_version }}

        docker run \
            --name vllm-ascend-env \
            --shm-size=128g \
            --net=host \
            --privileged=true \
            --device /dev/davinci0 \
            --device /dev/davinci1 \
            --device /dev/davinci2 \
            --device /dev/davinci3 \
            --device /dev/davinci4 \
            --device /dev/davinci5 \
            --device /dev/davinci6 \
            --device /dev/davinci7 \
            --device /dev/davinci_manager \
            --device /dev/devmm_svm \
            --device /dev/hisi_hdc \
            -v /usr/local/Ascend/driver:/usr/local/Ascend/driver \
            -v /usr/local/dcmi:/usr/local/dcmi \
            -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \
            -v /etc/ascend_install.info:/etc/ascend_install.info \
            -v /usr/local/sbin:/usr/local/sbin \
            -v /home:/home \
            -v /data:/data \
            -v /tmp:/tmp \
            -v /mnt:/mnt \
            -v /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime \
            -v /root:/host_root \
            -it -d $IMAGE bash
        ```

        默认工作目录为 `/workspace`。vLLM 和 vLLM-Ascend 已作为 Python 包安装在 site-packages 中。

        **安装验证：**

        启动容器后，运行以下命令验证安装：

        ```bash
        docker ps | grep vllm-ascend-env
        ```

        预期结果：容器状态显示为 `Up`。您也可以在容器内验证 vllm-ascend 版本：

        ```bash
        pip show vllm-ascend
        ```

        预期结果：显示版本信息，与拉取的镜像版本一致。
  pip:
    content: |-
      如果您不想使用 Docker 镜像，可以从源码构建。首先从源码安装 vLLM：

      1. 克隆并安装 vLLM：

         ```bash
         git clone https://github.com/vllm-project/vllm.git
         cd vllm
         pip install -e .
         ```

      2. 克隆并安装 vLLM-Ascend 仓库：

         ```bash
         git clone https://github.com/vllm-project/vllm-ascend.git
         cd vllm-ascend
         pip install -e .
         ```

      **安装验证：**

      ```bash
      pip show vllm vllm-ascend
      ```

      预期结果：显示两个包的版本信息，表明安装成功。

      > **说明**：如果部署多节点环境，需在每个节点上完成环境配置。

      更多详情请参考[安装指南](https://docs.vllm.ai/projects/ascend/zh-cn/latest/installation.html)。
scenarios:
- npu: Atlas 800I A3
  precision: W8A8
  deployment: 单节点-多卡
  case: Single Node Multi Card
  steps:
  - title: 启动服务
    content: |-
      单节点部署在同一节点内完成 Prefill 和 Decode，适用于开发、测试及中小规模推理场景。对于 Qwen3-30B-A3B MoE 模型，需要使用 Expert Parallelism (EP) 将专家分布到各个 NPU 上。

      以下命令为示例配置。请根据实际场景调整参数。

      **Atlas 800I A2/A3：**

      ```bash
      export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3
      export HCCL_OP_EXPANSION_MODE="AIV"  # not needed on A2
      export HCCL_BUFFSIZE=1024
      export OMP_PROC_BIND=false
      export OMP_NUM_THREADS=1
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

      vllm serve your_model_path \
          --served-model-name qwen3 \
          --trust-remote-code \
          --max-num-seqs 100 \
          --max-model-len 40960 \
          --max-num-batched-tokens 16384 \
          --tensor-parallel-size 4 \
          --enable-expert-parallel \
          --quantization ascend \
          --distributed_executor_backend "mp" \
          --no-enable-prefix-caching \
          --async-scheduling \
          --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
          --additional-config '{"enable_flashcomm1": true, "weight_nz_mode": 2}' \
          --gpu-memory-utilization 0.95 \
          --port 8000 \
          --speculative-config '{"method": "eagle3", "model": "your_eagle3_model_path", "draft_tensor_parallel_size": 1, "num_speculative_tokens": 3}'
      ```

      > - `ASCEND_RT_VISIBLE_DEVICES`：必须设置为分配给您环境的 NPU 芯片 ID（例如，4 芯片为 `0,1,2,3`）。
      > - `--port`：请根据实际情况调整，避免与同一机器上运行的其他服务冲突。
      > - `--no-enable-prefix-caching`：默认禁用，因为该模型在 Ascend NPU 上的前缀缓存效果尚未充分验证。您可以尝试启用该参数以评估工作负载的缓存命中率。
      > - `--quantization ascend`：使用 W8A8 量化模型时必需。使用 BF16 权重时请移除此参数。

      参数详情请参考：

      - [vLLM CLI 文档](https://docs.vllm.ai/en/stable/cli/) — 标准 serve 参数（`--host`、`--port`、`--max-model-len` 等）
      - [环境变量](https://docs.vllm.ai/projects/ascend/zh-cn/latest/user_guide/configuration/env_vars.html) — Ascend 特定环境变量（`HCCL_*` 等）
      - [额外配置](https://docs.vllm.ai/projects/ascend/zh-cn/latest/user_guide/configuration/additional_config.html) — `--additional-config` 格式和选项
  - title: 服务验证
    content: |-
      服务启动后，通过发送 prompt 验证其运行状态。使用示例请参考下方的验证部分。
