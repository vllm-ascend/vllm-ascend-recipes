prerequisites:
- title: 硬件要求
  content: |-
    | 模型版本 | 硬件要求 |
    |---------|---------|
    | Qwen3-30B-A3B (BF16) | Atlas 800I A3 (64G, 1~2 卡) 或 Atlas 800I A2 (64G, 2~4 卡) |
    | Qwen3-30B-A3B-W8A8 | Atlas 800I A3 (64G, 1~2 卡) 或 Atlas 800I A2 (64G, 2~4 卡) |

    > 以上为推荐卡数，可根据实际情况调整。
- title: W8A8 量化说明
  content: |-
    Qwen3-30B-A3B-W8A8 采用混合量化策略（按模型结构顺序）：

    - **Embedding 层**：BF16（不量化）
    - **Q/K 归一化** (q_norm, k_norm)：BF16
    - **Attention 投影** (q/k/v/o_proj)：静态 W8A8，预计算 per-tensor scales
    - **MoE 路由门** (mlp.gate)：BF16
    - **MoE 专家投影** (gate/up/down_proj)：动态 W8A8，推理时实时计算输入 scales

    > 如 W8A8 量化权重无法直接下载，可使用 msmodelslim 从 BF16 模型自行量化。
    > 参考 [量化指南](https://docs.vllm.ai/projects/ascend/en/latest/user_guide/feature_guide/quantization.html)。
env_setup:
  pip:
    content: |-
      ```bash
      git clone https://github.com/vllm-project/vllm.git
      cd vllm && pip install -e .

      git clone https://github.com/vllm-project/vllm-ascend.git
      cd vllm-ascend && pip install -e .
      ```

      验证安装：

      ```bash
      pip show vllm vllm-ascend
      ```
  container:
    A3:
      content: |-
        ```bash
        export IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1
        docker run \
            --name vllm-ascend-env \
            --shm-size=128g --net=host --privileged=true \
            --device /dev/davinci0 --device /dev/davinci1 \
            --device /dev/davinci2 --device /dev/davinci3 \
            --device /dev/davinci4 --device /dev/davinci5 \
            --device /dev/davinci6 --device /dev/davinci7 \
            --device /dev/davinci8 --device /dev/davinci9 \
            --device /dev/davinci10 --device /dev/davinci11 \
            --device /dev/davinci12 --device /dev/davinci13 \
            --device /dev/davinci14 --device /dev/davinci15 \
            --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \
            -v /usr/local/Ascend/driver:/usr/local/Ascend/driver \
            -v /usr/local/dcmi:/usr/local/dcmi \
            -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \
            -v /etc/ascend_install.info:/etc/ascend_install.info \
            -v /usr/local/sbin:/usr/local/sbin \
            -v /home:/home -v /data:/data -v /tmp:/tmp -v /mnt:/mnt \
            -v /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime \
            -v /root:/host_root \
            -it -d $IMAGE bash
        ```
    A2:
      content: |-
        ```bash
        export IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1
        docker run \
            --name vllm-ascend-env \
            --shm-size=128g --net=host --privileged=true \
            --device /dev/davinci0 --device /dev/davinci1 \
            --device /dev/davinci2 --device /dev/davinci3 \
            --device /dev/davinci4 --device /dev/davinci5 \
            --device /dev/davinci6 --device /dev/davinci7 \
            --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \
            -v /usr/local/Ascend/driver:/usr/local/Ascend/driver \
            -v /usr/local/dcmi:/usr/local/dcmi \
            -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \
            -v /etc/ascend_install.info:/etc/ascend_install.info \
            -v /usr/local/sbin:/usr/local/sbin \
            -v /home:/home -v /data:/data -v /tmp:/tmp -v /mnt:/mnt \
            -v /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime \
            -v /root:/host_root \
            -it -d $IMAGE bash
        ```

        > 默认工作目录为 `/workspace`，vLLM 和 vLLM-Ascend 已作为 Python 包安装在 site-packages 中。
scenarios:
- npu: Atlas 800I A3
  precision: W8A8
  deployment: 单节点-单卡
  case: Single Card
  steps:
  - title: 环境变量配置
    content: |-
      ```bash
      export ASCEND_RT_VISIBLE_DEVICES=0
      export HCCL_OP_EXPANSION_MODE="AIV"
      export HCCL_BUFFSIZE=1024
      export OMP_PROC_BIND=false
      export OMP_NUM_THREADS=1
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True
      ```
  - title: 启动服务（高吞吐配置）
    content: |-
      ```bash
      vllm serve your_model_path \
          --served-model-name qwen3 \
          --trust-remote-code \
          --max-num-seqs 100 \
          --max-model-len 37364 \
          --max-num-batched-tokens 16384 \
          --tensor-parallel-size 1 \
          --distributed_executor_backend "mp" \
          --no-enable-prefix-caching \
          --async-scheduling \
          --quantization ascend \
          --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
          --additional-config '{"weight_nz_mode": 2}' \
          --gpu-memory-utilization 0.95 \
          --port 8000 \
          --speculative-config '{"method": "eagle3","model": "your_eagle3_model_path", "num_speculative_tokens": 3}'
      ```

      > 单卡部署最大化并发请求处理。`--speculative-config` 配置 Eagle3 投机解码。
  - title: 验证服务
    content: |-
      ```bash
      curl http://localhost:8000/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{
              "model": "qwen3",
              "messages": [
                  {"role": "user", "content": "Give me a short introduction to large language models."}
              ],
              "temperature": 0.6,
              "top_p": 0.95,
              "top_k": 20,
              "max_completion_tokens": 4096
          }'
      ```
- npu: Atlas 800I A3
  precision: W8A8
  deployment: 单节点-多卡
  case: YaRN
  steps:
  - title: 环境变量配置
    content: |-
      ```bash
      export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3
      export HCCL_OP_EXPANSION_MODE="AIV"
      export HCCL_BUFFSIZE=1024
      export OMP_PROC_BIND=false
      export OMP_NUM_THREADS=1
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True
      ```
  - title: 启动服务（低延迟配置, TP4）
    content: |-
      ```bash
      vllm serve your_model_path \
          --served-model-name qwen3 \
          --trust-remote-code \
          --max-num-seqs 100 \
          --max-model-len 37364 \
          --max-num-batched-tokens 16384 \
          --tensor-parallel-size 4 \
          --enable-expert-parallel \
          --distributed_executor_backend "mp" \
          --no-enable-prefix-caching \
          --async-scheduling \
          --quantization ascend \
          --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
          --additional-config '{"enable_flashcomm1": true, "weight_nz_mode": 2}' \
          --gpu-memory-utilization 0.95 \
          --port 8000 \
          --speculative-config '{"method": "eagle3","model": "your_eagle3_model_path", "num_speculative_tokens": 3}'
      ```

      > 多卡 TP 降低每 token 延迟，配合 Expert Parallelism 分散 MoE 专家。
  - title: 长上下文配置（TP4, YaRN）
    content: |-
      ```bash
      vllm serve your_model_path \
          --served-model-name qwen3 \
          --trust-remote-code \
          --max-num-seqs 14 \
          --max-model-len 131072 \
          --max-num-batched-tokens 16384 \
          --tensor-parallel-size 4 \
          --enable-expert-parallel \
          --distributed_executor_backend "mp" \
          --no-enable-prefix-caching \
          --async-scheduling \
          --quantization ascend \
          --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
          --additional-config '{"enable_flashcomm1": true, "weight_nz_mode": 2}' \
          --gpu-memory-utilization 0.95 \
          --port 8000 \
          --speculative-config '{"method": "eagle3","model": "your_eagle3_model_path", "num_speculative_tokens": 3}' \
          --hf-overrides '{"rope_parameters": {"rope_type":"yarn","factor":4,"original_max_position_embeddings":32768}}'
      ```

      > 使用 YaRN 扩展上下文至 131K，减少并发序列数以适应更长上下文。
