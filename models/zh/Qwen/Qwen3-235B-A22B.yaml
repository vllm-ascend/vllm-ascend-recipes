updated: '2026-07-01'
overview: |-
  Qwen3 是 Qwen 系列的最新一代大语言模型，提供 Dense 和 MoE 两种架构。基于大规模训练，Qwen3 在推理、指令跟随、Agent 能力和多语言支持方面实现了突破性进展。Qwen3-235B-A22B 是最大的 MoE 变体，总参数 235B，每 token 激活 22B。

  本文档展示了 Qwen3-235B-A22B 在 vLLM-Ascend 环境中的主要验证步骤，包括支持特性、环境准备、单节点和多节点部署、精度和性能评估。

  **首次支持版本**：v0.8.4rc2。本文档基于 **vLLM-Ascend v0.21.0** 验证编写，所有 v0.21.0 及以上版本可稳定运行。
