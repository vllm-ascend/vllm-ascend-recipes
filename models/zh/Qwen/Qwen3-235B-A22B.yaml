evaluation:
  accuracy:
    content: |-
      ### 使用 AISBench

      关于安装、数据集下载和配置的详细信息，请参考 [使用 AISBench](../../developer_guide/evaluation/using_ais_bench.md)。

      以下是精度评估配置文件的示例：

      **精度评估配置文件：**

      ```python
      # 示例配置：benchmarks/ais_bench/benchmark/configs/models/vllm_api/vllm_api_general_chat.py
      from ais_bench.benchmark.models import VLLMCustomAPIChat
      from ais_bench.benchmark.utils.model_postprocessors import extract_non_reasoning_content

      models = [
          dict(
              attr="service",
              type=VLLMCustomAPIChat,
              abbr='vllm-api-general-chat',
              path="your_model_path",
              model="qwen3",
              request_rate = 0,
              retry = 2,
              host_ip = "127.0.0.1",
              host_port = 2001,
              max_out_len = 32768,
              batch_size = 32,
              trust_remote_code=False,
              generation_kwargs = dict(
                  temperature = 0.6,
                  top_k = 20,
                  top_p = 0.95,
              ),
              pred_postprocessor=dict(type=extract_non_reasoning_content)
          )
      ]
      ```

      **以 aime2024 数据集为例运行精度评估：**

      ```bash
      ais_bench --models vllm_api_general_chat --datasets aime2024_gen_0_shot_chat_prompt --debug
      ```

      > --models 参数值对应上述配置文件中的 abbr 字段。请根据实际场景调整 max_out_len、batch_size 和数据集任务。
  performance:
    content: |-
      ### 使用 AISBench

      关于安装、数据集下载和配置的详细信息，请参考 [使用 AISBench](../../developer_guide/evaluation/using_ais_bench.md#execute-performance-evaluation)。

      以下是性能评估配置文件的示例：

      ```python
      # 示例配置：benchmarks/ais_bench/benchmark/configs/models/vllm_api/vllm_api_stream_chat.py
      from ais_bench.benchmark.models import VLLMCustomAPIChat
      from ais_bench.benchmark.utils.postprocess.model_postprocessors import extract_non_reasoning_content

      models = [
          dict(
              attr="service",
              type=VLLMCustomAPIChat,
              abbr="vllm-api-stream-chat",
              path="your_model_path",
              model="qwen",
              stream=True,
              request_rate=0,
              use_timestamp=False,
              retry=2,
              host_ip="localhost",
              host_port=20002,
              max_out_len=1500,
              batch_size=140,
              trust_remote_code=False,
              generation_kwargs=dict(
                  temperature=0,
                  ignore_eos = True
              ),
          )
      ]
      ```

      **以 GSM8K 数据集为例运行性能评估：**

      ```bash
      ais_bench --models vllm_api_stream_chat --datasets gsm8k_gen_0_shot_cot_str_perf --debug --summarizer default_perf --mode perf --num-prompts 560
      ```

      ### 使用 vLLM Benchmark

      参考 [vLLM benchmark](https://docs.vllm.ai/en/latest/benchmarking/) 获取更多详情。

      vLLM bench 有三个子命令：

      - `latency`：单批次请求延迟基准测试。
      - `serve`：在线服务吞吐量基准测试。
      - `throughput`：离线推理吞吐量基准测试。

      以 `serve` 为例：

      ```shell
      vllm bench serve \
          --model your_model_path \
          --dataset-name random \
          --random-input 200 \
          --num-prompts 200 \
          --request-rate 1 \
          --save-result \
          --result-dir ./
      ```

      数分钟后即可获得性能评估结果。
performance:
  benchmark: |-
    ### 推荐配置

    > **注意**：以下配置在特定测试环境中验证，仅供参考。最佳配置取决于最大输入/输出长度、前缀缓存命中率、精度要求和部署机器比例等因素。建议参考第 9.2 节根据实际情况进行调优。

    #### 表 1：场景概览

    | 场景 | 部署模式 | *总 NPU 数 | 权重版本 | 关键考虑因素 |
    |----------|----------------|-------------|----------------|---------------------|
    | 高吞吐 | 单节点 (TP4, DP4) | 16 (A3) | W8A8 | DP 和 TP 将 MoE 专家分布到 16 个 NPU 上，实现最大吞吐 |
    | 高吞吐 | PD 分离 (3 节点) | 48 (3×A3) | W8A8 | 3 节点 PD 分离平衡 prefill 和 decode 资源，实现高吞吐 |
    | 低延迟 | 单节点 (TP16) | 16 (A3) | W8A8 | 16 NPU TP 配合投机解码，最小化每 token 延迟 |
    | 长上下文 | 单节点 (TP8, CP2) | 16 (A3) | W8A8 | 16 NPU TP 配合 Context Parallelism，将上下文扩展到 135K tokens |

    > `*总 NPU 数` 表示所有节点使用的 NPU 总数。

    #### 表 2：详细节点配置

    | 场景 | 配置 | #NPUs | TP | DP | MTP 投机数量 | FUSED_MC2 | EP 开关 | 异步调度 |
    |----------|---------------|-------|----|-------------|--------------------|-----------|-----------|--------------|
    | 高吞吐 | 单节点 | 16 | 4 | 4 | none | On | On | On |
    | 低延迟 | 单节点 | 16 | 16 | 1 | 3 | Off | On | On |
    | 长上下文 | 单节点 | 16 | 8 | 1 | none | On | On | Off |

    > 更多参数详情，请参考 [第 5.1 节](#51-single-node-online-deployment) 中的部署示例。
