- npu: Atlas 800I A3
  precision: W8A8
  deployment: 多节点-PD分离
  case: PD Separation
  steps:
  - title: 概述
    content: |-
      PD（Prefill-Decode）分离将 Prefill 和 Decode 阶段拆分到不同节点以获得更好的吞吐量。以下示例展示了三节点 A3 PD 分离场景（1 个 Prefill 节点 + 2 个 Decode 节点）的参数配置。

      详细部署指南请参考 [Prefill-Decode Disaggregation Mooncake 验证](../features/pd_disaggregation_mooncake_multi_node.md)。

      **硬件**：3 × Atlas 800 A3 (64G × 16)，1 个用于 Prefill，2 个用于 Decode。
  - title: 准备 launch_online_dp.py
    content: |-
      首先在每个节点上准备 `launch_online_dp.py`：

      ```python
      import argparse
      import multiprocessing
      import os
      import subprocess
      import sys

      def parse_args():
          parser = argparse.ArgumentParser()
          parser.add_argument("--dp-size", type=int, required=True, help="Data parallel size.")
          parser.add_argument("--tp-size", type=int, default=1, help="Tensor parallel size.")
          parser.add_argument("--dp-size-local", type=int, default=-1, help="Local data parallel size.")
          parser.add_argument("--dp-rank-start", type=int, default=0, help="Starting rank for data parallel.")
          parser.add_argument("--dp-address", type=str, required=True, help="IP address for data parallel master node.")
          parser.add_argument("--dp-rpc-port", type=str, default=12345, help="Port for data parallel master node.")
          parser.add_argument("--vllm-start-port", type=int, default=9000, help="Starting port for the engine.")
          return parser.parse_args()

      args = parse_args()
      dp_size = args.dp_size
      tp_size = args.tp_size
      dp_size_local = args.dp_size_local
      if dp_size_local == -1:
          dp_size_local = dp_size
      dp_rank_start = args.dp_rank_start
      dp_address = args.dp_address
      dp_rpc_port = args.dp_rpc_port
      vllm_start_port = args.vllm_start_port

      def run_command(visible_devices, dp_rank, vllm_engine_port):
          command = [
              "bash",
              "./run_dp_template.sh",
              visible_devices,
              str(vllm_engine_port),
              str(dp_size),
              str(dp_rank),
              dp_address,
              dp_rpc_port,
              str(tp_size),
          ]
          subprocess.run(command, check=True)

      if __name__ == "__main__":
          template_path = "./run_dp_template.sh"
          if not os.path.exists(template_path):
              print(f"Template file {template_path} does not exist.")
              sys.exit(1)

          processes = []
          num_cards = dp_size_local * tp_size
          for i in range(dp_size_local):
              dp_rank = dp_rank_start + i
              vllm_engine_port = vllm_start_port + i
              visible_devices = ",".join(str(x) for x in range(i * tp_size, (i + 1) * tp_size))
              process = multiprocessing.Process(target=run_command, args=(visible_devices, dp_rank, vllm_engine_port))
              processes.append(process)
              process.start()

          for process in processes:
              process.join()
      ```
  - title: 准备 run_dp_template.sh – Prefill 节点
    content: |-
      然后在每个节点上准备 `run_dp_template.sh`。

      **Prefill 节点**（请将 `nic_name` 和 `local_ip` 设置为实际值）：

      ```bash
      nic_name="<your_nic_name>"
      local_ip="<your_ip>"

      export HCCL_IF_IP=$local_ip
      export GLOO_SOCKET_IFNAME=$nic_name
      export TP_SOCKET_IFNAME=$nic_name
      export HCCL_SOCKET_IFNAME=$nic_name

      export HCCL_BUFFSIZE=512
      export HCCL_OP_EXPANSION_MODE="AIV"
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

      export OMP_NUM_THREADS=1
      echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
      sysctl -w vm.swappiness=0
      sysctl -w kernel.numa_balancing=0
      sysctl kernel.sched_migration_cost_ns=50000
      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD
      export TASK_QUEUE_ENABLE=1
      export LD_LIBRARY_PATH=/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH

      export ASCEND_RT_VISIBLE_DEVICES=$1

      vllm serve "/data/weights/Qwen3-235B-A22B-w8a8-rot" \
          --host 0.0.0.0 \
          --port $2 \
          --data-parallel-size $3 \
          --data-parallel-rank $4 \
          --data-parallel-address $5 \
          --data-parallel-rpc-port $6 \
          --tensor-parallel-size $7 \
          --enable-expert-parallel \
          --served-model-name qwen3_235b \
          --max-model-len 40960 \
          --max-num-batched-tokens 16384 \
          --max-num-seqs 24 \
          --trust-remote-code \
          --gpu-memory-utilization 0.9 \
          --quantization ascend \
          --no-enable-prefix-caching \
          --enforce-eager \
          --additional-config '{"enable_flashcomm1": true, "enable_fused_mc2": 1}' \
          --kv-transfer-config \
              '{"kv_connector": "MooncakeConnectorV1",
              "kv_role": "kv_producer",
              "kv_port": "30000",
              "engine_id": "0",
              "kv_connector_extra_config": {
                   "use_ascend_direct": true,
                   "prefill": {
                          "dp_size": 2,
                          "tp_size": 8
                   },
                   "decode": {
                          "dp_size": 8,
                          "tp_size": 4
                   }
              }
              }'
      ```
