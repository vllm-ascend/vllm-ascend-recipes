        默认工作目录为 `/workspace`。vLLM 和 vLLM-Ascend 作为 Python 包安装在 site-packages 中。

        安装验证：
        启动容器后，运行以下命令验证安装：

        ```bash
        docker ps | grep vllm-ascend-env
        ```

        预期结果：容器列出且状态为 Up。也可以在容器内验证 vllm-ascend 版本：

        ```bash
        pip show vllm-ascend
        ```

        预期结果：显示版本信息，与拉取的镜像版本一致。
