      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD
      export TASK_QUEUE_ENABLE=1
      export LD_LIBRARY_PATH=/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH

      export VLLM_TORCH_PROFILER_WITH_STACK=0
      export ASCEND_RT_VISIBLE_DEVICES=$1

      vllm serve "/data/weights/Qwen3-235B-A22B-w8a8-rot" \
          --host 0.0.0.0 \
          --port $2 \
          --data-parallel-size $3 \
          --data-parallel-rank $4 \
          --data-parallel-address $5 \
          --data-parallel-rpc-port $6 \
          --tensor-parallel-size $7 \
          --enable-expert-parallel \
          --served-model-name qwen3_235b \
          --max-model-len 40960 \
          --max-num-batched-tokens 512 \
          --max-num-seqs 128 \
          --trust-remote-code \
          --gpu-memory-utilization 0.9 \
          --quantization ascend \
          --no-enable-prefix-caching \
          --async-scheduling \
          --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}' \
          --additional-config '{"enable_flashcomm1": true, "enable_fused_mc2": 2}' \
          --kv-transfer-config \
              '{"kv_connector": "MooncakeConnectorV1",
              "kv_role": "kv_consumer",
              "kv_port": "30100",
              "engine_id": "1",
              "kv_connector_extra_config": {
                   "use_ascend_direct": true,
                   "prefill": {
                          "dp_size": 2,
                          "tp_size": 8
                   },
                   "decode": {
                          "dp_size": 8,
                          "tp_size": 4
                   }
              }
              }'
      ```
  - title: 启动服务
    content: |-
      脚本准备好后，在各节点上启动服务。

      **Prefill 节点：**

      ```bash
      python launch_online_dp.py \
          --dp-size 2 --tp-size 8 \
          --dp-size-local 2 --dp-rank-start 0 \
          --dp-address <prefill_ip> --dp-rpc-port 54951 \
          --vllm-start-port 9123
      ```

      **Decode 节点 0：**

      ```bash
      python launch_online_dp.py \
          --dp-size 8 --tp-size 4 \
          --dp-size-local 4 --dp-rank-start 0 \
          --dp-address <decode_ip> --dp-rpc-port 54951 \
          --vllm-start-port 9123
      ```

      **Decode 节点 1：**

      ```bash
      python launch_online_dp.py \
          --dp-size 8 --tp-size 4 \
          --dp-size-local 4 --dp-rank-start 4 \
          --dp-address <decode_ip> --dp-rpc-port 54951 \
          --vllm-start-port 9123
      ```
  - title: 请求转发
    content: |-
      在可以访问两个节点的任意机器上运行 proxy。可以从仓库获取 proxy 脚本：[load_balance_proxy_server_example.py](https://github.com/vllm-project/vllm-ascend/blob/main/examples/disaggregated_prefill_v1/load_balance_proxy_server_example.py)。

      ```bash
      unset http_proxy https_proxy

      python load_balance_proxy_server_example.py \
        --port 38085 \
        --host <prefill_ip> \
        --prefiller-hosts \
          <prefill_ip> <prefill_ip> \
        --prefiller-ports \
          9123 9124 \
        --decoder-hosts \
          <decode0_ip> <decode0_ip> <decode0_ip> <decode0_ip> \
          <decode1_ip> <decode1_ip> <decode1_ip> <decode1_ip> \
        --decoder-ports \
          9123 9124 9125 9126 \
          9123 9124 9125 9126
      ```
  - title: 服务验证
    content: |-
      服务启动成功后，将显示以下启动日志：

      ```text
      (APIServer pid=<pid>) INFO:     Started server process [<pid>]
      (APIServer pid=<pid>) INFO:     Waiting for application startup.
      (APIServer pid=<pid>) INFO:     Application startup complete.
      ```
