- npu: Atlas 800I A3
  precision: W8A8
  deployment: 单节点-PD混合
  steps:
  - title: 高吞吐配置 (TP4, DP4)
    content: |-
      单节点 PD 混合部署，优化 Atlas 800I A3 (64G × 16) 上的最大吞吐：

      ```bash
      export HCCL_IF_IP=<node_ip>
      export GLOO_SOCKET_IFNAME=<ifname>
      export TP_SOCKET_IFNAME=<ifname>
      export HCCL_SOCKET_IFNAME=<ifname>
      export HCCL_OP_EXPANSION_MODE="AIV"
      export HCCL_BUFFSIZE=1024
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True
      export OMP_NUM_THREADS=1
      echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
      sysctl -w vm.swappiness=0
      sysctl -w kernel.numa_balancing=0
      sysctl kernel.sched_migration_cost_ns=50000
      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD
      export TASK_QUEUE_ENABLE=1

      vllm serve your_model_path \
          --served-model-name qwen3 \
          --host <host_ip> --port <port> \
          --async-scheduling \
          --tensor-parallel-size 4 \
          --data-parallel-size 4 \
          --data-parallel-size-local 4 \
          --data-parallel-start-rank 0 \
          --data-parallel-address <node_ip> \
          --data-parallel-rpc-port <rpc_port> \
          --enable-expert-parallel \
          --max-num-seqs 128 \
          --max-model-len 32768 \
          --max-num-batched-tokens 16384 \
          --gpu-memory-utilization 0.9 \
          --trust-remote-code --quantization ascend \
          --no-enable-prefix-caching \
          --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
          --additional-config '{"enable_cpu_binding":true, "enable_flashcomm1": true, "enable_fused_mc2": 1}'
