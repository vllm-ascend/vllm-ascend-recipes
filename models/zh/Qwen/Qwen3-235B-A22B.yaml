      vllm serve "/data/weights/Qwen3-235B-A22B-w8a8-rot" \
          --host 0.0.0.0 --port $2 \
          --data-parallel-size $3 --data-parallel-rank $4 \
          --data-parallel-address $5 --data-parallel-rpc-port $6 \
          --tensor-parallel-size $7 \
          --enable-expert-parallel \
          --served-model-name qwen3_235b \
          --max-model-len 40960 --max-num-batched-tokens 16384 \
          --max-num-seqs 24 --trust-remote-code \
          --gpu-memory-utilization 0.9 --quantization ascend \
          --no-enable-prefix-caching --enforce-eager \
          --additional-config '{"enable_flashcomm1": true, "enable_fused_mc2": 1}' \
          --kv-transfer-config \
