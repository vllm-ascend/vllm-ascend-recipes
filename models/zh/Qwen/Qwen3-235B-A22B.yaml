faq: |-
  关于常见的环境、安装和通用参数问题，请参考 [vLLM-Ascend FAQ](https://docs.vllm.ai/projects/ascend/en/latest/faqs.html)。本节仅涵盖 Qwen3-235B-A22B 特有的问题。

  ### Q: Qwen3-235B-A22B 需要什么硬件？

  对于 BF16：1 个 Atlas 800I A3 (64G × 16) 节点、1 个 Atlas 800I A2 (64G × 8) 节点或 2 个 Atlas 800I A2 (32G × 8) 节点。对于 W8A8 量化版本，硬件需求类似。

  ### Q: 如何启用超过 40K 的长上下文？

  使用 yarn rope-scaling。对于 vLLM >= v0.12.0：`--hf-overrides '{"rope_parameters": {"rope_type":"yarn","rope_theta":1000000,"factor":4,"original_max_position_embeddings":32768}}'`。对于旧版本，使用 `--rope_scaling`。Qwen3-235B-A22B-Instruct-2507 等模型变体原生支持长上下文，无需此参数。

  ### Q: 什么时候使用 PD 分离 vs 单节点部署？

  单节点部署更简单，在模型能放入单个节点时推荐使用。PD 分离将 Prefill 和 Decode 拆分到不同节点，可为大规模服务提供更高的吞吐量。对于 Qwen3-235B-A22B，使用 PD 分离的三个 A3 节点可实现约 3 倍于单节点部署的吞吐量。

  ### Q: `enable_fused_mc2=1` 和 `=2` 有什么区别？

  值 `1` 启用基础 MoE 融合算子，适用于典型的 EP 配置。值 `2` 启用针对大规模 EP（例如 PD 分离场景中的 EP32）优化的替代融合策略。两者均为实验性功能，目前仅在 Atlas A3 服务器上支持 W8A8 量化。

  ### Q: 什么时候应该使用 Expert Parallelism？

  对于 Qwen3-235B-A22B（MoE 模型），应始终通过 `--enable-expert-parallel` 启用 Expert Parallelism (EP)。它将 FFN 专家分布到各个 NPU 上以减少每个设备的计算量。EP 与 TP 协同工作，MoE 层使用 EP，非 MoE 层使用 TP。

  ### Q: 如何在 Context Parallelism 和 PD Disaggregation 之间选择？

  Context Parallelism (CP) 将单个请求的 KV 缓存拆分到多个 NPU 上，适用于单节点长上下文场景。PD Disaggregation 将 Prefill 和 Decode 分离到不同节点，适用于高并发请求的高吞吐服务。
