meta:
  title: "DeepSeek-V4-Flash"
  slug: "deepseek-v4-flash"
  provider: "DeepSeek"
  description: "DeepSeek V4 MoE 模型，采用混合 CSA+HCA 注意力机制、流形约束超连接，支持三种推理模式（Non-think / Think High / Think Max）。"
  date_added: 2026-07-07
  performance_headline: "紧凑型 284B/13B V4 变体 — 单节点 1M 上下文服务，支持 W8A8 权重和 MTP"
  hardware:
    atlas_800_a3: verified
    atlas_800_a2: verified

model:
  model_id: "deepseek-ai/DeepSeek-V4-Flash"
  min_vllm_version: "0.8.4rc2"
  architecture: moe
  parameter_count: "284B"
  active_parameters: "13B"
  context_length: 1048576
  modality: text

overview: |-
  DeepSeek-V4 相比 DeepSeek-V3 引入了多项关键升级：

  - 流形约束超连接（mHC），用于增强传统残差连接。
  - 混合注意力架构，通过 Compress-4-Attention 和 Compress-128-Attention 大幅提升长上下文效率。对于混合专家（MoE）组件，仍采用 DeepSeekMoE 架构，仅做了少量调整。

  DeepSeek-V4-Flash 是 DeepSeek-V4 系列的轻量级变体，适用于高吞吐量和低延迟的服务场景。

  本文档将展示该模型的主要验证步骤，包括支持的特性、特性配置、环境准备、单节点和多节点部署、精度和性能评估。

  > **注意**：请将上述版本占位符替换为您实际的验证版本。
