    content: |-
      参考 [Prefill-Decode Disaggregation (Deepseek)](https://docs.vllm.ai/projects/ascend/zh-cn/latest/tutorials/features/pd_disaggregation_mooncake_multi_node.html) 部署 P-D 分离代理。

      关键参数说明：

      - `VLLM_ASCEND_ENABLE_FLASHCOMM1=1`：启用 prefill 节点上的通信优化功能。
      - `recompute_scheduler_enable: true`：启用重计算调度器。当 decode 节点的 KV Cache 不足时，请求将被发送到 prefill 节点以重新计算 KV Cache。在 PD 分离场景中，仅在 decode 节点上启用此配置。
