prerequisites:
- title: 模型权重
  content: |-
    - `DeepSeek-V4-Flash-w8a8-mtp`（量化版本）：需要 1 个 Atlas 800 A3（128G × 8）节点或 1 个 Atlas 800 A2（64G × 8）节点。[下载模型权重](https://www.modelscope.cn/models/Eco-Tech/DeepSeek-V4-Flash-w8a8-mtp)

