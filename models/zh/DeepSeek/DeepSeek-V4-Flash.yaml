scenarios:
- npu: Atlas 800I A2
  precision: W8A8
  deployment: 单节点-多卡
  case: Multi Card
  default_configs:
  - mtp-spec-decoding
  - async-scheduling
  - flashcomm1
  steps:
  - title: 启动服务
    content: |-
      单节点部署在同一节点内完成 Prefill 和 Decode。量化模型 `DeepSeek-V4-Flash-w8a8-mtp` 可以部署在 1 个 Atlas 800 A3（128G × 8）或 1 个 Atlas 800 A2（64G × 8）上。

      运行以下脚本执行在线推理。

      ```shell
      export OMP_PROC_BIND=false
      export OMP_NUM_THREADS=10
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True
      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD
      export HCCL_BUFFSIZE=1024
      %%CONFIG:flashcomm1%%export VLLM_ASCEND_ENABLE_FLASHCOMM1=1%%/CONFIG:flashcomm1%%
      export TASK_QUEUE_ENABLE=1
      export HCCL_OP_EXPANSION_MODE="AIV"

      vllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp \
          --max-model-len 133120 \
          --max-num-batched-tokens 8192 \
          --served-model-name dsv4 \
          --gpu-memory-utilization 0.9 \
          --max-num-seqs 32 \
          --data-parallel-size 1 \
          --tensor-parallel-size 8 \
          --enable-expert-parallel \
          --tokenizer-mode deepseek_v4 \
          --tool-call-parser deepseek_v4 \
          --enable-auto-tool-choice \
          --reasoning-parser deepseek_v4 \
          --safetensors-load-strategy 'prefetch' \
          %%CONFIG:prefix-caching%%--enable-prefix-caching \%%/CONFIG:prefix-caching%%
          --model-loader-extra-config='{"enable_multithread_load": "true", "num_threads": 128}' \
          --quantization ascend \
          --port 8900 \
          --block-size 128 \
          %%CONFIG:mtp-spec-decoding%%--speculative-config '{"num_speculative_tokens": 1,"method": "mtp","enforce_eager": true}' \%%/CONFIG:mtp-spec-decoding%%
          --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
          %%CONFIG:async-scheduling%%--async-scheduling \%%/CONFIG:async-scheduling%%
          --additional-config '{"ascend_compilation_config":{%%CONFIG:npugraph-ex%%"enable_npugraph_ex":true,%%/CONFIG:npugraph-ex%%"enable_static_kernel":false}%%CONFIG:cpu-binding%%,"enable_cpu_binding": true%%/CONFIG:cpu-binding%%%%CONFIG:dsa-cp%%,"enable_dsa_cp": true%%/CONFIG:dsa-cp%%%%CONFIG:multistream-overlap%%,"multistream_overlap_shared_expert":true%%/CONFIG:multistream-overlap%%}'
      ```

      关键参数说明：

      - `--max-model-len` 指定最大上下文长度——即单个请求的输入和输出 token 之和。请根据实际场景调整。
      - `--no-enable-prefix-caching` 表示禁用前缀缓存。要启用它，请移除此选项。
      - `--speculative-config` 配置 MTP（Multi-Token Prediction）推测解码以加速推理。
      - `--compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}'` 启用解码阶段的完整 ACL 图执行，以降低调度延迟。
      - `--async-scheduling` 启用异步调度，使 CPU 调度与 NPU 计算重叠执行。
      - `VLLM_ASCEND_ENABLE_FLASHCOMM1=1` 启用 FlashComm 通信优化。

      常见问题提示：如果遇到问题，请参考[公共 FAQ](https://docs.vllm.ai/projects/ascend/zh-cn/latest/faqs.html) 进行排查。
    config_values:
      prefix-caching:
        enabled: "--enable-prefix-caching"
        disabled: "--no-enable-prefix-caching"
  - title: 服务验证
    content: |-
      ```shell
      curl http://<node0_ip>:8900/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{
              "model": "dsv4",
              "messages": [
                  {
                      "role": "user",
                      "content": "Who are you?"
                  }
              ],
              "max_tokens": 256,
              "temperature": 0
          }'
      ```

      预期结果：

      服务返回 HTTP 200 OK，包含带有 `choices` 字段的 JSON 响应。
