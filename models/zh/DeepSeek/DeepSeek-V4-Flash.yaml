- npu: Atlas 800I A3
  precision: W8A8
  deployment: 多节点-PD分离
  case: PD Separation
  steps:
  - title: 概述
    content: |-
      我们推荐使用 Mooncake 进行部署：[Mooncake](https://docs.vllm.ai/projects/ascend/zh-cn/latest/tutorials/features/pd_disaggregation_mooncake_multi_node.html)。

      在标准的单节点部署模式下，Prefill（提示词处理）和 Decode（token 生成）任务在同一组 NPU 上运行。这可能导致两个问题：

      1. **Prefill 抢占中断 Decode**：Prefill 是计算密集型任务，一次性处理整个输入上下文，而 Decode 逐个生成 token。当新用户请求到达时，其 Prefill 阶段可能抢占并中断正在进行的 Decode 任务，导致抖动和更高的每输出 token 时间（TPOT）延迟。
      2. **资源分配不灵活**：Prefill 和 Decode 具有根本不同的计算特性——Prefill 是计算密集型和内存带宽密集型，而 Decode 是内存带宽密集型。在同一硬件上运行它们会强制做出无法最优满足两者的妥协。

      PD（Prefill-Decode）分离通过在专用节点组上分别运行 Prefill 和 Decode 来解决这些问题，每组独立配置。此架构推荐用于具有并发多用户工作负载的生产部署，其中需要稳定的延迟和高吞吐量。

      本节展示 DeepSeek-V4-Flash 在 Atlas 800 A3（128G × 8）多节点环境中的部署指南，使用 1P1D 以获得更好的性能。
  - title: 准备 launch_online_dp.py
    content: |-
      在每个节点上准备脚本 `launch_online_dp.py`。

      ```python
      import argparse
      import multiprocessing
      import os
      import subprocess
      import sys

      def parse_args():
          parser = argparse.ArgumentParser()
          parser.add_argument(
              "--dp-size",
              type=int,
              required=True,
              help="Data parallel size."
          )
          parser.add_argument(
              "--tp-size",
              type=int,
              default=1,
              help="Tensor parallel size."
          )
          parser.add_argument(
              "--dp-size-local",
              type=int,
              default=-1,
              help="Local data parallel size."
          )
          parser.add_argument(
              "--dp-rank-start",
              type=int,
              default=0,
              help="Starting rank for data parallel."
          )
          parser.add_argument(
              "--dp-address",
              type=str,
              required=True,
              help="IP address for data parallel master node."
          )
          parser.add_argument(
              "--dp-rpc-port",
              type=str,
              default=12345,
              help="Port for data parallel master node."
          )
          parser.add_argument(
              "--vllm-start-port",
              type=int,
              default=9000,
              help="Starting port for the engine."
          )
          return parser.parse_args()

      args = parse_args()
      dp_size = args.dp_size
      tp_size = args.tp_size
      dp_size_local = args.dp_size_local
      if dp_size_local == -1:
          dp_size_local = dp_size
      dp_rank_start = args.dp_rank_start
      dp_address = args.dp_address
      dp_rpc_port = args.dp_rpc_port
      vllm_start_port = args.vllm_start_port

      def run_command(visible_devices, dp_rank, vllm_engine_port):
          command = [
              "bash",
              "./run_dp_template.sh",
              visible_devices,
              str(vllm_engine_port),
              str(dp_size),
              str(dp_rank),
              dp_address,
              dp_rpc_port,
              str(tp_size),
          ]
          subprocess.run(command, check=True)

      if __name__ == "__main__":
          template_path = "./run_dp_template.sh"
          if not os.path.exists(template_path):
              print(f"Template file {template_path} does not exist.")
              sys.exit(1)

          processes = []
          num_cards = dp_size_local * tp_size
          for i in range(dp_size_local):
              dp_rank = dp_rank_start + i
              vllm_engine_port = vllm_start_port + i
              visible_devices = ",".join(str(x) for x in range(i * tp_size, (i + 1) * tp_size))
              process = multiprocessing.Process(target=run_command,
                                              args=(visible_devices, dp_rank,
                                                      vllm_engine_port))
              processes.append(process)
              process.start()

          for process in processes:
              process.join()
      ```

      参数说明：

      |参数|类型|必填|默认值|说明|
      |---------|----|--------|-------|-----------|
      |`--dp-size`|int|是|-|数据并行大小（所有节点上 DP rank 的总数）。|
      |`--tp-size`|int|否|1|每个 DP rank 内的张量并行大小。|
      |`--dp-size-local`|int|否|（与 `--dp-size` 相同）|当前节点上的 DP rank 数量。如果未设置，默认为 `--dp-size`。|
      |`--dp-rank-start`|int|否|0|此节点上数据并行 rank 的起始偏移量。|
      |`--dp-address`|str|是|-|数据并行主节点的 IP 地址。|
      |`--dp-rpc-port`|str|否|12345|数据并行主节点通信的 RPC 端口。|
      |`--vllm-start-port`|int|否|9000|此节点上每个 vLLM 引擎实例的起始端口。|
  - title: 准备 run_dp_template.sh – Prefill 节点
    content: |-
      Prefill 节点：

      ```shell
      nic_name="xxxx" # 更改为您自己的网卡名称
      local_ip=xx.xx.xx.1 # 更改为您自己的 IP

      export HCCL_IF_IP=$local_ip
      export GLOO_SOCKET_IFNAME=$nic_name
      export TP_SOCKET_IFNAME=$nic_name
      export HCCL_SOCKET_IFNAME=$nic_name
      export VLLM_RPC_TIMEOUT=3600000
      export VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS=30000
      export HCCL_EXEC_TIMEOUT=204
      export HCCL_CONNECT_TIMEOUT=120
      export OMP_PROC_BIND=false
      export OMP_NUM_THREADS=10
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True
      export HCCL_BUFFSIZE=2560
      export TASK_QUEUE_ENABLE=1
      export VLLM_ASCEND_ENABLE_FLASHCOMM1=1
      export HCCL_OP_EXPANSION_MODE="AIV"
      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD
      export ASCEND_RT_VISIBLE_DEVICES=$1

      vllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp \
          --host 0.0.0.0 \
          --port $2 \
          --data-parallel-size $3 \
          --data-parallel-rank $4 \
          --data-parallel-address $5 \
          --data-parallel-rpc-port $6 \
          --tensor-parallel-size $7 \
          --enable-expert-parallel \
          --seed 1024 \
          --served-model-name dsv4 \
          --max-model-len 1048576 \
          --max-num-batched-tokens 8192 \
          --max-num-seqs 16 \
          --no-disable-hybrid-kv-cache-manager \
          --model-loader-extra-config='{"enable_multithread_load": "true", "num_threads": 128}' \
          --no-enable-prefix-caching \
          --safetensors-load-strategy 'prefetch' \
          --speculative-config '{"num_speculative_tokens": 1,"method": "mtp","enforce_eager": true}' \
          --trust-remote-code \
          --block-size 128 \
          --tokenizer-mode deepseek_v4 \
          --tool-call-parser deepseek_v4 \
          --enable-auto-tool-choice \
          --reasoning-parser deepseek_v4 \
          --gpu-memory-utilization 0.9 \
          --quantization ascend \
          --enforce-eager \
          --additional-config '{"enable_cpu_binding": true, "enable_shared_expert_dp": true,  "enable_dsa_cp": true}' \
          --kv-transfer-config \
