performance:
  benchmark: |-
    ### 推荐配置

    > **注意**：以下配置在特定测试环境中验证，仅供参考。最佳配置取决于最大输入/输出长度、前缀缓存命中率、精度要求和部署机器比例等因素。建议参考第 9.2 节根据实际条件进行调优。

    #### 表 1：场景概览

    > `*总 NPU 数` 表示所有节点使用的 NPU 总数。

    |场景|部署模式|*总 NPU 数|权重版本|关键考虑因素|
    |--------|---------------|-----------|---------------|-------------------|
    |高吞吐量|单节点混合|16（A3）|DeepSeek-V4-Flash-w8a8-mtp|使用 dp4 tp4 平衡内存容量和计算效率|
