verification: |-
  服务启动后，可以通过发送提示词调用模型。

  **Completions API：**

  ```shell
  curl http://localhost:8000/v1/completions \
      -H "Content-Type: application/json" \
      -d '{
          "model": "glm-52",
          "prompt": "请简要介绍大语言模型。",
          "max_tokens": 256,
          "temperature": 0
      }'
  ```

  > - **URL**（`http://localhost:8000`）：将 `localhost` 和 `8000` 替换为服务器 IP 和 `vllm serve` 命令中的 `--port` 值。
  > - **`model`**：必须与 `vllm serve` 命令中的 `--served-model-name` 值匹配（如 `glm-52`）。

  **函数调用：**

  要启用函数调用，请在 `vllm serve` 命令中添加以下参数：

  ```bash
  --tool-call-parser glm47 --reasoning-parser glm45 --enable-auto-tool-choice
  ```

  预期结果：HTTP 200，返回包含 `choices` 字段的 JSON 响应及生成文本。
performance:
  benchmark: |-
    ### 推荐配置

    > **注意**：以下配置在特定测试环境中验证，仅供参考。最优配置取决于最大输入/输出长度、前缀缓存命中率、精度要求和部署机器配比等因素。

    #### 表 1：场景概览

    | 场景 | 部署模式 | *总 NPU 数 | 权重版本 | 关键考虑 |
    |------|---------|-----------|---------|---------|
    | 高吞吐 | 单节点（A3） | 16（A3） | W8A8 | dp2 tp8 启用专家并行，最大化吞吐 |
    | 低延迟 | 单节点（A3） | 16（A3） | W8A8 | dp1 tp16 禁用专家并行，降低延迟 |
    | 长上下文 | 多节点（A3） | 32（A3） | W8A8 | 2 节点，dp2 tp16 扩展上下文 |
    | PD 分离（A3） | 多节点（A3） | 32（A3） | W8A8 | 4 节点，1P1D 部署，适用于生产工作负载 |
    | PD 分离（A2） | 多节点（A2） | 64（A2） | W8A8 | 8 节点，2P2D 部署 |

    > `*总 NPU 数`表示所有节点使用的 NPU 芯片总数。

    #### 表 2：PD 分离配置（A3）

    | 角色 | 配置 | 最大模型长度 | MTP Token 数 |
    |------|------|------------|-------------|
    | Prefill | dp=2, tp=16 | 135000 | 5 |
    | Decode | dp=8, tp=4 | 135000 | 5 |

    #### 表 3：PD 分离配置（A2）

    | 角色 | 配置 | 最大模型长度 | MTP Token 数 |
    |------|------|------------|-------------|
    | Prefill | dp=4, tp=8 | 115168 | 3 |
    | Decode | dp=8, tp=4 | 135168 | 3 |
tuning: |-
  ### 调优指南

  请参考 [公开性能调优文档](../../developer_guide/performance_and_debug/optimization_and_tuning.md) 了解调优方法。
  请参考 [功能指南](../../user_guide/support_matrix/feature_matrix.md) 了解详细功能描述。

  **GLM-5.2 关键调优说明：**

  - 单节点低延迟场景推荐 `dp1 tp16` 并禁用专家并行。
  - `VLLM_ASCEND_ENABLE_FLASHCOMM1=1` 在长序列（>=16k）和低并发（<=8 batch size）场景下应禁用。
  - `VLLM_ASCEND_ENABLE_MLAPO=1` 在 W8A8 量化模型的 Decode 端必需。
  - `DYNAMIC_EPLB=1` 在 Decode 节点启用动态专家并行负载均衡。
  - 200k 上下文窗口请使用共置 4 节点配置，dp4 tp8。
faq: |-
  常见环境、安装和通用参数问题请参考 [公开 FAQ](https://docs.vllm.ai/projects/ascend/en/latest/faqs.html)。本章仅涵盖模型特定问题。

  **Q：如何启用函数调用？**

  在 `vllm serve` 命令中添加以下参数：

  ```bash
  --tool-call-parser glm47 --reasoning-parser glm45 --enable-auto-tool-choice
  ```

  **Q：如何优化单节点低延迟？**

  使用 `dp1 tp16` 配置并禁用专家并行。

  **Q：如何部署 200k 上下文窗口？**

  使用共置 4 节点配置，dp4 tp8，`--max-model-len 200000`。
