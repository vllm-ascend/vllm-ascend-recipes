overview: |-
  GLM-5.2 是智谱 AI（THUDM）推出的混合专家（MoE）模型，总参数量 753B，面向复杂系统工程和长周期智能体任务。支持最多 5 个投机 Token 的多 Token 预测（MTP）投机解码、异步调度、动态 EPLB 和 Prefill-Decode 分离部署于昇腾 NPU。

  本文档将演示 GLM-5.2 在 vLLM-Ascend 环境中的主要验证步骤，包括支持的特性、环境准备、单节点和多节点部署，以及精度和性能评估。

  本文档基于 **vLLM-Ascend v0.22.1rc** 验证并编写。所有 **v0.22.1rc 及更高版本**均可稳定运行。如需使用最新特性，建议使用最新的候选版本或正式版本。
