prerequisites:
- title: 模型权重
  content: |-
    以下模型变体可用。建议将模型权重下载到所有节点可访问的共享目录。

    | 模型 | 硬件需求 | 下载 |
    |------|---------|------|
    | GLM-4.5（BF16） | Atlas 800I A3 (64G×16) × 1 | [下载](https://www.modelscope.cn/models/ZhipuAI/GLM-4.5) |
    | GLM-4.5-w8a8 | Atlas 800I A3 (64G×16) × 1<br>Atlas 800I A2 (64G×8) × 1 | [下载](https://modelers.cn/models/Modelers_Park/GLM-4.5-w8a8) |
    | GLM-4.6（BF16） | Atlas 800I A3 (64G×16) × 1 | [下载](https://www.modelscope.cn/models/ZhipuAI/GLM-4.6) |
    | GLM-4.6-w8a8 | Atlas 800I A3 (64G×16) × 1<br>Atlas 800I A2 (64G×8) × 1 | [下载](https://modelers.cn/models/Modelers_Park/GLM-4.6-w8a8) |
    | GLM-4.7（BF16） | Atlas 800I A3 (64G×16) × 1 | [下载](https://www.modelscope.cn/models/ZhipuAI/GLM-4.7) |
    | GLM-4.7-w8a8 | Atlas 800I A3 (64G×16) × 1<br>Atlas 800I A2 (64G×8) × 1 | [下载](https://modelscope.cn/models/Eco-Tech/GLM-4.7-W8A8-floatmtp) |

    以上为推荐卡数，可根据实际情况调整。

    > **注意**：GLM-4.6 没有 MTP 量化版本，因为 vLLM 不支持 GLM-4.6 MTP。
- title: 验证多节点通信
  content: |-
