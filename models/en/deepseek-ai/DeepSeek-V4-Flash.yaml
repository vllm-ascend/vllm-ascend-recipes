description: DeepSeek-V4 系列的轻量级变体，采用 Manifold-Constrained Hyper-Connections (mHC) 和混合注意力架构，适合高吞吐和低延迟推理服务场景。
architecture: moe
parameters: —
active_parameters: —
context_length: 1048576
modality: text
updated: '2026-07-01'
overview: |-
  DeepSeek-V4 引入了多项关键升级：

  - **Manifold-Constrained Hyper-Connections (mHC)**：强化传统残差连接
  - **混合注意力架构**：通过 Compress-4-Attention 和 Compress-128-Attention 提升长上下文效率
  - **DeepSeekMoE 架构**：MoE 组件保持 DeepSeekMoE 架构，仅做少量调整

  DeepSeek-V4-Flash 是轻量级变体，适合高吞吐和低延迟服务场景。本文档展示了模型的主要验证步骤，包括支持特性、特性配置、环境准备、单节点和多节点部署、精度和性能评估。
