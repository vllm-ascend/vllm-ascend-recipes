hf_id: ZhipuAI/GLM-4.7
title: GLM-4.5/4.6/4.7
provider: THUDM
description: GLM-4.x series are Mixture-of-Experts (MoE) foundational models from Zhipu AI, specifically designed
  for agent applications. GLM-4.7 features the latest improvements with support for MTP speculative decoding,
  expert parallelism, and PD disaggregation on Ascend NPUs.
architecture: moe
parameters: 31B
active_parameters: null
context_length: 133000
modality: text
updated: '2026-07-13'
overview: |-
  GLM-4.x (GLM-4.5/4.6/4.7) are Mixture-of-Experts (MoE) foundational models from Zhipu AI (THUDM), specifically designed for agent applications. They support Multi-Token Prediction (MTP) speculative decoding, expert parallelism, data parallelism, and Prefill-Decode disaggregation on Ascend NPUs.

  This document demonstrates the main validation steps for GLM-4.x in the vLLM-Ascend environment, including supported features, environment preparation, single-node and multi-node deployment, as well as accuracy and performance evaluation.

  The GLM-4.5 model is first supported in vllm-ascend v0.10.0rc1. This document is validated and written based on **vLLM-Ascend v0.22.1rc**. All **v0.22.1rc and later versions** can run stably. To use the latest features, it is recommended to use the latest release candidate or official version.

  > **Note**: GLM-4.5, GLM-4.6, and GLM-4.7 share the same architecture and deployment commands. The differences are in the training data and model weights. This document uses GLM-4.7 as the primary example; simply replace the model path for GLM-4.5 or GLM-4.6.
