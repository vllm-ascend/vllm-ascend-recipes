meta:
  title: "GLM-5"
  slug: "glm-5"
  provider: "THUDM"
  description: "GLM-5 and GLM-5.1 are Mixture-of-Experts (MoE) models from Zhipu AI, targeting complex systems engineering and long-horizon agentic tasks. GLM-5 features 744B total parameters, with support for MTP speculative decoding, expert parallelism, and PD disaggregation on Ascend NPUs."
  date_added: 2026-07-13
  performance_headline: "Multi-node deployment on Atlas 800 A3 (128G × 8) with W4A8/W8A8 precision"
  hardware:
    atlas_800_a3: verified
    atlas_800_a2: verified

model:
  model_id: "zai-org/GLM-5"
  min_vllm_version: "0.17.0rc1"
  architecture: moe
