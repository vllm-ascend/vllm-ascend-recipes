overview: |-
  GLM-5.2 is a Mixture-of-Experts (MoE) model from Zhipu AI (THUDM) with 753B total parameters, targeting complex systems engineering and long-horizon agentic tasks. It supports Multi-Token Prediction (MTP) speculative decoding with up to 5 speculative tokens, async scheduling, dynamic EPLB, and Prefill-Decode disaggregation on Ascend NPUs.

  This document demonstrates the main validation steps for GLM-5.2 in the vLLM-Ascend environment, including supported features, environment preparation, single-node and multi-node deployment, as well as accuracy and performance evaluation.

  This document is validated and written based on **vLLM-Ascend v0.22.1rc**. All **v0.22.1rc and later versions** can run stably. To use the latest features, it is recommended to use the latest release candidate or official version.
