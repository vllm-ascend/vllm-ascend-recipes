meta:
  title: "GLM-5.2"
  slug: "glm-5.2"
  provider: "THUDM"
  description: "GLM-5.2 is a Mixture-of-Experts (MoE) model from Zhipu AI with 753B total parameters, targeting complex systems engineering and long-horizon agentic tasks. It supports MTP speculative decoding with up to 5 speculative tokens, async scheduling, and PD disaggregation on Ascend NPUs."
