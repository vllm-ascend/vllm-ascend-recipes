verification: |-
  After the service is started, the model can be invoked by sending a prompt.

  **Completions API:**

  ```shell
  curl http://localhost:8000/v1/completions \
      -H "Content-Type: application/json" \
      -d '{
          "model": "glm-52",
          "prompt": "Give me a short introduction to large language models.",
          "max_tokens": 256,
          "temperature": 0
      }'
  ```

  > - **URL** (`http://localhost:8000`): Replace `localhost` and `8000` with your server IP and the `--port` value from the `vllm serve` command.
  > - **`model`**: Must match the `--served-model-name` value from the `vllm serve` command (e.g., `glm-52`).

  **Function Calling:**

  To enable function calling, add the following flags to the `vllm serve` command:

  ```bash
  --tool-call-parser glm47 --reasoning-parser glm45 --enable-auto-tool-choice
  ```

  Expected result: HTTP 200 with a JSON response containing the `choices` field with generated text.
performance:
  benchmark: |-
    ### Recommended Configurations

    > **Note**: The following configurations are validated in specific test environments and are for reference only. The optimal configuration depends on factors such as maximum input/output length, prefix cache hit rate, precision requirements, and deployment machine ratios.

    #### Table 1: Scenario Overview

    | Scenario | Deployment Mode | *Total NPUs | Weight Version | Key Considerations |
    |----------|----------------|-------------|----------------|-------------------|
    | High Throughput | Single-Node (A3) | 16 (A3) | W8A8 | dp2 tp8 with expert parallel for maximum throughput |
    | Low Latency | Single-Node (A3) | 16 (A3) | W8A8 | dp1 tp16 with expert parallel disabled for lower latency |
    | Long Context | Multi-Node (A3) | 32 (A3) | W8A8 | 2 nodes, dp2 tp16 for extended context |
    | PD Separation (A3) | Multi-Node (A3) | 32 (A3) | W8A8 | 4 nodes, 1P1D deployment for production workloads |
    | PD Separation (A2) | Multi-Node (A2) | 64 (A2) | W8A8 | 8 nodes, 2P2D deployment |

    > `*Total NPUs` indicates the total number of NPU chips used across all nodes.

    #### Table 2: PD Separation Configuration (A3)

    | Role | Config | Max Model Len | MTP Tokens |
    |------|--------|---------------|------------|
    | Prefill | dp=2, tp=16 | 135000 | 5 |
    | Decode | dp=8, tp=4 | 135000 | 5 |

    #### Table 3: PD Separation Configuration (A2)

    | Role | Config | Max Model Len | MTP Tokens |
    |------|--------|---------------|------------|
    | Prefill | dp=4, tp=8 | 115168 | 3 |
    | Decode | dp=8, tp=4 | 135168 | 3 |
tuning: |-
  ### Tuning Guidelines

  Please refer to the [Public Performance Tuning Documentation](https://docs.vllm.ai/projects/ascend/en/latest/developer_guide/performance_and_debug/optimization_and_tuning.html) for tuning methods.
  Please refer to the [Feature Guide](https://docs.vllm.ai/projects/ascend/en/latest/user_guide/support_matrix/feature_matrix.html) for detailed feature descriptions.

  **Key tuning notes for GLM-5.2:**

  - For single-node low-latency scenarios, recommend `dp1 tp16` with expert parallel disabled.
  - `VLLM_ASCEND_ENABLE_FLASHCOMM1=1` should be disabled for long-sequence (>=16k) and low-concurrency (<=8 batch size) scenarios.
  - `VLLM_ASCEND_ENABLE_MLAPO=1` is required for W8A8 quantized models on the decode side.
  - `DYNAMIC_EPLB=1` enables dynamic expert parallel load balancing on decode nodes.
  - For 200k context window, use co-located 4-node configuration with dp4 tp8.
faq: |-
  For common environment, installation, and general parameter issues, please refer to the [Public FAQ](https://docs.vllm.ai/projects/ascend/en/latest/faqs.html). This chapter only covers model-specific issues.

  **Q: How to enable function calling?**

  Add the following flags to the `vllm serve` command:

  ```bash
  --tool-call-parser glm47 --reasoning-parser glm45 --enable-auto-tool-choice
  ```

  **Q: How to optimize for single-node low-latency?**

  Use `dp1 tp16` configuration and disable expert parallel.

  **Q: How to deploy 200k context window?**

  Use co-located 4-node configuration with dp4 tp8 and `--max-model-len 200000`.
