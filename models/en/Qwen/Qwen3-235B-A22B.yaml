hf_id: Qwen/Qwen3-235B-A22B
title: Qwen3-235B-A22B
provider: Qwen
description: The largest MoE variant of the Qwen3 series with 235B total parameters and 22B activated per token. Breakthrough
  advancements in reasoning, instruction-following, agent capabilities, and multilingual support.
architecture: moe
parameters: 235B
active_parameters: 22B
context_length: 131072
modality: text
updated: '2026-07-01'
overview: |-
  Qwen3 is the latest generation of large language models in the Qwen series, offering a comprehensive suite of dense and mixture-of-experts (MoE) models. Built upon extensive training, Qwen3 delivers groundbreaking advancements in reasoning, instruction-following, agent capabilities, and multilingual support. Qwen3-235B-A22B is the largest MoE variant, featuring 235B total parameters with 22B activated per token.

  This document demonstrates the main validation steps for Qwen3-235B-A22B in the vLLM-Ascend environment, including supported features, environment preparation, single-node and multi-node deployment, accuracy and performance evaluation.

  **First supported version**: v0.8.4rc2. This document is validated on **vLLM-Ascend v0.21.0**. All v0.21.0 and later versions can run stably.
